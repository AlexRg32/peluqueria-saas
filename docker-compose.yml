services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peluqueria-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=peluqueria_saas
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - CACHE_STORE=database
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage/app
    networks:
      - peluqueria-network

  postgres:
    image: postgres:16-alpine
    container_name: peluqueria-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: peluqueria_saas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d peluqueria_saas"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - peluqueria-network

  # Servicio para desarrollo (opcional)
  dev:
    image: node:20-alpine
    container_name: peluqueria-dev
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    profiles:
      - dev
    networks:
      - peluqueria-network

volumes:
  postgres-data:
  storage:
  node_modules:

networks:
  peluqueria-network:
    driver: bridge
