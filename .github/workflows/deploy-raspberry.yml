name: Deploy Raspberry API

on:
  push:
    branches:
      - main
    paths:
      - "saloria-api/**"
      - "deploy/raspberry/**"
      - ".github/workflows/deploy-raspberry.yml"
  workflow_dispatch:

concurrency:
  group: deploy-raspberry-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Redeploy API on Raspberry over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RASPBERRY_HOST }}
          username: ${{ secrets.RASPBERRY_USER }}
          key: ${{ secrets.RASPBERRY_SSH_KEY }}
          port: ${{ secrets.RASPBERRY_PORT || '22' }}
          script_stop: true
          script: |
            APP_PATH="${{ secrets.RASPBERRY_APP_PATH }}"
            if [ -z "$APP_PATH" ]; then
              APP_PATH="$HOME/saloria"
            fi

            cd "$APP_PATH"
            ./deploy/raspberry/scripts/redeploy.sh
