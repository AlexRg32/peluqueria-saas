name: Deploy Raspberry API

"on":
  push:
    branches:
      - main
    paths:
      - "saloria-api/**"
      - "deploy/raspberry/**"
      - ".github/workflows/deploy-raspberry.yml"
  workflow_dispatch:

concurrency:
  group: deploy-raspberry-prod
  cancel-in-progress: true

jobs:
  build-api-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image_meta.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: image_meta
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          image_repo="ghcr.io/${owner}/${repo}-api"
          echo "image=${image_repo}:sha-${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "latest=${image_repo}:raspberry-latest" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push arm64 API image
        uses: docker/build-push-action@v6
        with:
          context: ./saloria-api
          file: ./saloria-api/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.image_meta.outputs.image }}
            ${{ steps.image_meta.outputs.latest }}

  deploy:
    needs: build-api-image
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    runs-on:
      - self-hosted
      - raspberry
      - prod

    steps:
      - name: Redeploy API on Raspberry
        env:
          SALORIA_API_IMAGE: ${{ needs.build-api-image.outputs.image }}
          GHCR_REGISTRY: ghcr.io
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
          ALLOW_LOCAL_BUILD_FALLBACK: "1"
        run: |
          cd "$HOME/Saloria"
          ./deploy/raspberry/scripts/redeploy.sh
