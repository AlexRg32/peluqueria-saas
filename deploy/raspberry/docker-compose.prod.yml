services:
  app:
    build:
      context: ../../saloria-api
      dockerfile: Dockerfile
    image: ${SALORIA_API_IMAGE:-saloria-api:raspberry}
    container_name: saloria_api
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - uploads_data:/data/uploads
    expose:
      - "8080"
    networks:
      - edge
      - internal

  caddy:
    image: caddy:2.8-alpine
    container_name: saloria_caddy
    profiles:
      - caddy
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: saloria_cloudflared
    profiles:
      - cloudflare
    restart: unless-stopped
    depends_on:
      - app
    env_file:
      - .env.prod
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    networks:
      - edge

  db:
    image: postgres:15
    container_name: saloria_db
    profiles:
      - local-db
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

networks:
  edge:
  internal:

volumes:
  uploads_data:
  postgres_data:
  caddy_data:
  caddy_config:
